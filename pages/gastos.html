    <main class="main-content">
      <section class="section" id="gastos">
        <div class="section-header">
          <span class="section-badge">💸</span>
          <div>
            <h2 class="section-title">Controle de Gastos</h2>
            <p class="section-sub">Registre e acompanhe seus gastos pessoais</p>
          </div>
        </div>
        <div class="grid-2">
          <div class="card card-glass">
            <h3 class="card-title">Registrar Gasto</h3>
            <form class="form-stack" id="gastoForm">
              <div class="field-group">
                <label for="gastoNome">Nome do gasto</label>
                <input
                  type="text"
                  id="gastoNome"
                  placeholder="Ex: Mercado, Uber..."
                  required
                />
              </div>
              <div class="field-group">
                <label for="gastoCategoria">Categoria</label>
                <select id="gastoCategoria">
                  <option value="alimentacao">🍔 Alimentação</option>
                  <option value="transporte">🚗 Transporte</option>
                  <option value="lazer">🎮 Lazer</option>
                  <option value="saude">💊 Saúde</option>
                  <option value="educacao">📚 Educação</option>
                  <option value="moradia">🏠 Moradia</option>
                  <option value="vestuario">👗 Vestuário</option>
                  <option value="outros">📦 Outros</option>
                </select>
              </div>
              <div class="field-row">
                <div class="field-group">
                  <label for="gastoValor">Valor (R$)</label>
                  <input
                    type="number"
                    id="gastoValor"
                    placeholder="0,00"
                    min="0"
                    step="0.01"
                    required
                  />
                </div>
                <div class="field-group">
                  <label for="gastoData">Data</label>
                  <input type="date" id="gastoData" required />
                </div>
              </div>
              <div class="field-group">
                <label for="gastoDesc"
                  >Como você se sentiu após essa compra?</label
                >
                <textarea
                  id="gastoDesc"
                  rows="2"
                  placeholder="Opcional..."
                ></textarea>
              </div>
              <div class="form-actions">
                <button type="submit" class="btn btn-primary">
                  <span>Registrar</span>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                    <path
                      d="M12 5v14M5 12l7 7 7-7"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                    />
                  </svg>
                </button>
                <button
                  type="button"
                  class="btn btn-outline"
                  id="btnVerGrafico"
                >
                  Ver gráfico
                </button>
              </div>
            </form>
          </div>

          <div class="card card-glass">
            <div class="card-header-row">
              <h3 class="card-title">Últimos Gastos</h3>
              <span class="badge-total" id="totalGastos">R$ 0,00</span>
            </div>
            <div class="expense-list" id="gastoList"></div>
            <p class="empty-state" id="gastoEmpty">
              Nenhum gasto registrado ainda.
            </p>
          </div>
        </div>
      </section>
    </main>

    <div class="toast" id="toast"></div>

        <div id="modalContent"></div>
