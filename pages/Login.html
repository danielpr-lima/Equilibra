<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/global.css" /> <link rel="stylesheet" href="../css/login-style.css" />
    <title>Login - Equilibra</title>
  </head>
  <body>
    <div class="main-login">
      <div class="left-login">
        <h1>Bem-Vindo ao Equilibra<br />Seu Diário Financeiro</h1>
        <img src="../img/login-img.svg" class="left-login-image" alt="Login" />
      </div>

      <div class="right-login">
        <div class="card-login">
          
          <form id="formLogin">
            <h1>LOGIN</h1>
            <div class="textfield">
              <label for="loginEmail">E-mail</label>
              <input type="email" id="loginEmail" placeholder="seu@email.com" required />
            </div>
            <div class="textfield">
              <label for="loginSenha">Senha</label>
              <input type="password" id="loginSenha" placeholder="Senha" required />
            </div>
            
            <button type="submit" class="btn-login" style="margin-top: 15px;">Login</button>
          </form>

          <div class="login-footer" style="margin-top: 20px; text-align: center; width: 100%;">
            <p style="color: white;">Ainda não tem conta? <a href="registro.html" style="color: #a855f7; font-weight: 600;">Crie uma agora</a></p>
          </div>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script type="module" src="../js/app.js"></script>
  </body>
</html>
