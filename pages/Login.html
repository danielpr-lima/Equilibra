<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/login-style.css" />
    <title>Login</title>
  </head>
  <body>
    <div class="main-login">
      <div class="left-login">
        <h1>Bem-Vindo ao Equilibra<br />Seu Diário Financeiro</h1>
        <img src="../img/login-img.svg" class="left-login-image" alt="" />
      </div>

      <div class="right-login">
        <div class="card-login">
          <form id="formLogin">
            <h1>LOGIN</h1>
            <div class="textfield">
              <label for="usuario">Usuário</label>
              <input type="text" id="usuario" placeholder="Usuário" />
            </div>
            <div class="textfield">
              <label for="senha">Senha</label>
              <input type="password" id="senha" placeholder="Senha" />
            </div>
          </form>
          <button
            onclick="window.location.href = '../pages/home.html'"
            class="btn-login"
          >
            Login
          </button>
          <p>Ainda não tem conta? <a href="registro.html" class="btn-registro">Crie uma agora</a></p>
        </div>
      </div>
    </div>
  </body>
</html>
