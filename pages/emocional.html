    <main class="main-content">
      <section class="section" id="emocional">
        <div class="section-header">
          <span class="section-badge">🧠</span>
          <div>
            <h2 class="section-title">Registro Emocional</h2>
            <p class="section-sub">Como suas emoções impactam suas finanças?</p>
          </div>
        </div>
        <div class="grid-2">
          <div class="card card-glass">
            <h3 class="card-title">Como você está se sentindo?</h3>
            <div class="mood-grid">
              <button class="mood-btn" data-mood="otimo" type="button">
                😌<span>Ótimo</span>
              </button>
              <button class="mood-btn" data-mood="bem" type="button">
                🙂<span>Bem</span>
              </button>
              <button class="mood-btn" data-mood="neutro" type="button">
                😐<span>Neutro</span>
              </button>
              <button class="mood-btn" data-mood="ansioso" type="button">
                😰<span>Ansioso</span>
              </button>
              <button class="mood-btn" data-mood="mal" type="button">
                😔<span>Mal</span>
              </button>
              <button class="mood-btn" data-mood="exagero" type="button">
                🤯<span>Exagero</span>
              </button>
            </div>
            <form
              class="form-stack"
              id="emocionalForm"
              style="margin-top: 16px"
            >
              <div class="field-group">
                <label for="emocionalTexto"
                  >Escreva sobre sua situação financeira hoje</label
                >
                <textarea
                  id="emocionalTexto"
                  rows="4"
                  placeholder="Como você se sentiu com suas finanças hoje? Tomou alguma decisão importante? O que gostaria de melhorar?"
                ></textarea>
              </div>
              <button type="submit" class="btn btn-primary">Registrar</button>
            </form>
          </div>
          <div class="card card-glass">
            <h3 class="card-title">Registros Anteriores</h3>
            <div class="emocional-list" id="emocionalList"></div>
            <p class="empty-state" id="emocionalEmpty">
              Nenhum registro emocional ainda.
            </p>
          </div>
        </div>
      </section>
    </main>

    <div class="toast" id="toast"></div>
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal" id="modal">
        <button class="modal-close" id="modalClose">×</button>
        <div id="modalContent"></div>
