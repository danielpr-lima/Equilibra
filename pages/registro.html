<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equilibra - Criar Conta</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/login-style.css"> </head>
<body>
    <div class="login-container">
        <div class="login-banner">
            <div class="banner-content">
                <img src="../img/icons/icon-logo.svg" alt="Logo Equilibra" class="login-logo-img">
                <h2>Junte-se ao Equilibra</h2>
                <p>Comece a sua jornada de autoconhecimento financeiro hoje mesmo.</p>
            </div>
        </div>

        <div class="login-form-area">
            <div class="form-wrapper">
                <h1 class="login-title">Criar Conta</h1>
                <p class="login-subtitle">Preencha seus dados para começar.</p>

                <form id="formRegistro" class="form-stack">
                    <div class="field-group">
                        <label for="regNome">Nome completo</label>
                        <input type="text" id="regNome" placeholder="Ex: Daniel Lima" required>
                    </div>

                    <div class="field-group">
                        <label for="regEmail">E-mail</label>
                        <input type="email" id="regEmail" placeholder="seu@email.com" required>
                    </div>

                    <div class="field-group">
                        <label for="regSenha">Senha</label>
                        <input type="password" id="regSenha" placeholder="Crie uma senha forte" required minlength="6">
                    </div>

                    <div class="field-group">
                        <label for="regConfirmaSenha">Confirmar Senha</label>
                        <input type="password" id="regConfirmaSenha" placeholder="Repita a senha" required minlength="6">
                    </div>

                    <button type="submit" class="btn btn-primary full-width" style="margin-top: 10px;">Cadastrar</button>
                </form>

                <div class="login-footer">
                    <p>Já tem uma conta? <a href="login.html">Faça login aqui</a></p>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script type="module" src="../js/app.js"></script>
</body>
</html>
