<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/login-style.css" />
    <title>Criar Conta - Equilibra</title>
  </head>
  <body>
    <div class="main-login">
      <div class="left-login">
        <h1>Junte-se ao Equilibra<br />Crie sua conta</h1>
        <img src="../img/login-img.svg" class="left-login-image" alt="Registro" />
      </div>

      <div class="right-login">
        <div class="card-login">
          
          <form id="formRegistro">
            <h1>REGISTRO</h1>
            
            <div class="textfield">
              <label for="regNome">Nome completo</label>
              <input type="text" id="regNome" placeholder="Ex: Guilhermi..." required />
            </div>

            <div class="textfield">
              <label for="regEmail">E-mail</label>
              <input type="email" id="regEmail" placeholder="seu@email.com" required />
            </div>

            <div class="textfield">
              <label for="regSenha">Senha</label>
              <input type="password" id="regSenha" placeholder="Crie uma senha forte" required minlength="6" />
            </div>

            <div class="textfield">
              <label for="regConfirmaSenha">Confirmar Senha</label>
              <input type="password" id="regConfirmaSenha" placeholder="Repita a senha" required minlength="6" />
            </div>
            
            <button type="submit" class="btn-login" style="margin-top: 15px;">Cadastrar</button>
          </form>

          <div class="login-footer" style="margin-top: 20px; text-align: center; width: 100%;">
            <p style="color: white;">Já tem uma conta? <a href="login.html" style="color: #a855f7; font-weight: 600;">Faça login aqui</a></p>
          </div>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script type="module" src="../js/app.js"></script>
  </body>
</html>
