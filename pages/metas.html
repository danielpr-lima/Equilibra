    <main class="main-content">
      <section class="section" id="metas">
        <div class="section-header">
          <span class="section-badge">🎯</span>
          <div>
            <h2 class="section-title">Metas Financeiras</h2>
            <p class="section-sub">Defina objetivos e acompanhe sua evolução</p>
          </div>
        </div>
        <div class="grid-2">
          <div class="card card-glass">
            <div class="card-header-row">
              <h3 class="card-title">Suas Metas</h3>
            </div>
            <div class="metas-list" id="metasList"></div>
            <p class="empty-state" id="metasEmpty" style="display: none">
              Nenhuma meta cadastrada.
            </p>
          </div>
          <div class="card card-glass">
            <h3 class="card-title">Nova Meta</h3>
            <form class="form-stack" id="metaForm">
              <div class="field-group">
                <label for="metaNome">Meta</label>
                <input
                  type="text"
                  id="metaNome"
                  placeholder="Ex: Viagem, Notebook..."
                  required
                />
              </div>
              <div class="field-group">
                <label for="metaValor">Valor necessário (R$)</label>
                <input
                  type="number"
                  id="metaValor"
                  placeholder="0,00"
                  min="0"
                  step="0.01"
                  required
                />
              </div>
              <div class="field-group">
                <label for="metaPrazo">Prazo</label>
                <input type="month" id="metaPrazo" required />
              </div>
              <div class="field-group">
                <label for="metaProgresso">Progresso atual (%)</label>
                <div class="range-wrap">
                  <input
                    type="range"
                    id="metaProgresso"
                    min="0"
                    max="100"
                    value="0"
                    class="range-input"
                  />
                  <span class="range-value" id="metaProgressoVal">0%</span>
                </div>
              </div>
              <button type="submit" class="btn btn-primary full-width">
                Registrar
              </button>
            </form>
          </div>
        </div>
      </section>
    </main>

    <div class="toast" id="toast"></div>

        <div id="modalContent"></div>
