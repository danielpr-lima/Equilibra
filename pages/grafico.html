    <main class="main-content">
      <section class="section" id="grafico">
        <div class="section-header">
          <span class="section-badge">📈</span>
          <div>
            <h2 class="section-title">Gráfico de Gastos</h2>
            <p class="section-sub">
              Visualize seus últimos gastos por categoria
            </p>
          </div>
        </div>
        <div class="grid-2">
          <div class="card card-glass chart-card">
            <h3 class="card-title">Seus últimos gastos</h3>
            <div class="chart-wrap">
              <canvas id="pieChart"></canvas>
            </div>
          </div>
          <div class="card card-glass chart-card">
            <h3 class="card-title">Como você está se sentindo?</h3>
            <div class="chart-wrap">
              <canvas id="barChart"></canvas>
            </div>
            <div class="chart-actions">
              <button class="btn btn-outline small" id="btnRegistrarSentimento">
                Registrar
              </button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div class="toast" id="toast"></div>
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal" id="modal">
        <button class="modal-close" id="modalClose">×</button>
        <div id="modalContent"></div>
      </div>
    </div>
